# Playwright E2E — Runs against Vercel preview deployment on every PR
# Industry standard: test against the real preview deployment, not a local server
# This catches Vercel-specific issues (edge functions, serverless, caching)

name: Playwright E2E

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  wait-for-vercel-preview:
    name: Wait for Vercel Preview
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      preview_url: ${{ steps.wait.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Vercel preview deployment
        id: wait
        uses: jakub-g/await-vercel-preview@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          vercel_project_id: ${{ secrets.VERCEL_PROJECT_ID }}
          # vercel_org_id: not needed with github_token auth
          max_timeout_seconds: 300 # 5 minutes max wait

  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [wait-for-vercel-preview]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test --reporter=html
        env:
          PLAYWRIGHT_TEST_BASE_URL: ${{ needs.wait-for-vercel-preview.outputs.preview_url }}
          # Add env vars if needed, but preview has its own env from Vercel

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
